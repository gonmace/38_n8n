{# Variables: field_name, enabled, label_value, value, hint, placeholder #}
<div class="row" style="flex-direction:column; gap:6px;">
  <div style="display:flex; align-items:center; gap:8px;">
    {# Etiqueta editable #}
    <input type="text"
           name="{{ field_name }}_label"
           value="{{ label_value }}"
           placeholder="ETIQUETA"
           style="flex:1; background:transparent; border:none; outline:none;
                  font-size:.6875rem; font-weight:700; letter-spacing:.06em;
                  text-transform:uppercase; color:var(--text-2); font-family:inherit;
                  padding:0; min-width:0;">
    {# Toggle #}
    <label style="position:relative; display:inline-block; width:36px; height:22px; flex-shrink:0;">
      <input type="checkbox"
             name="{{ field_name }}_enabled"
             {% if enabled %}checked{% endif %}
             onchange="toggleSection(this)"
             style="opacity:0; width:0; height:0; position:absolute;">
      <span class="sec-track" style="
        position:absolute; cursor:pointer; inset:0; border-radius:22px;
        background:{% if enabled %}var(--accent){% else %}var(--text-3){% endif %};
        transition:.2s;">
        <span class="sec-thumb" style="
          position:absolute; height:16px; width:16px; left:3px; bottom:3px;
          background:#fff; border-radius:50%; transition:.2s;
          transform:{% if enabled %}translateX(14px){% else %}translateX(0){% endif %};
        "></span>
      </span>
    </label>
  </div>
  <div class="sec-body" style="{% if not enabled %}display:none;{% endif %}">
    <textarea class="field" name="prompt_{{ field_name }}" rows="3"
              placeholder="{{ placeholder }}">{{ value }}</textarea>
    <p class="row-hint" style="margin-top:4px;">{{ hint }}</p>
  </div>
</div>
